<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amma Cafe - Fresh Brews, Cozy Corners</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #FAF7F2;
            --dark-brown: #2D1F1A;
            --warm-brown: #8B5E3C;
            --soft-green: #7A8B5A;
            --light-brown: #B8906E;
            --accent-cream: #F5EFE6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cream);
            color: var(--dark-brown);
            overflow: hidden;
            height: 100vh;
        }

        /* Decorative Background Pattern */
        .intro-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FAF7F2 0%, #F5EFE6 100%);
            overflow: hidden;
        }

        .intro-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(122, 139, 90, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 94, 60, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Decorative Elements */
        .decor-circle {
            position: absolute;
            border: 1px solid rgba(139, 94, 60, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
            animation: floatRotate 20s infinite ease-in-out;
        }

        .circle-2 {
            width: 300px;
            height: 300px;
            bottom: -80px;
            left: -80px;
            animation: floatRotate 25s infinite ease-in-out reverse;
        }

        .circle-3 {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
            animation: floatRotate 30s infinite ease-in-out;
        }

        /* Coffee Bean Icons */
        .coffee-bean {
            position: absolute;
            font-size: 20px;
            opacity: 0.08;
            animation: float 6s infinite ease-in-out;
        }

        .bean-1 { top: 15%; left: 15%; animation-delay: 0s; }
        .bean-2 { top: 25%; right: 20%; animation-delay: 1s; }
        .bean-3 { bottom: 20%; left: 25%; animation-delay: 2s; }
        .bean-4 { bottom: 30%; right: 15%; animation-delay: 1.5s; }

        /* Main Content */
        .content-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 700px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeSlideUp 1.2s ease-out forwards 0.3s;
        }

        /* Logo/Icon */
        .cafe-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            opacity: 0;
            animation: fadeSlideUp 1s ease-out forwards 0.5s;
        }

        .cafe-icon svg {
            width: 100%;
            height: 100%;
        }

        /* Cafe Name */
        .cafe-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            color: var(--dark-brown);
            margin-bottom: 1rem;
            letter-spacing: 2px;
            line-height: 1.1;
            opacity: 0;
            animation: fadeSlideUp 1s ease-out forwards 0.7s;
        }

        .cafe-name .amma {
            display: block;
            font-style: italic;
        }

        /* Decorative Line */
        .divider {
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--warm-brown), transparent);
            margin: 2rem auto;
            opacity: 0;
            animation: expandWidth 1.2s ease-out forwards 0.9s;
        }

        /* Tagline */
        .tagline {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1rem, 3vw, 1.4rem);
            font-weight: 300;
            color: var(--warm-brown);
            letter-spacing: 1px;
            margin-bottom: 3rem;
            line-height: 1.6;
            opacity: 0;
            animation: fadeSlideUp 1s ease-out forwards 1.1s;
        }

        /* Leaf Decorations around tagline */
        .leaf-left, .leaf-right {
            display: inline-block;
            color: var(--soft-green);
            font-size: 1.2rem;
            margin: 0 0.75rem;
            opacity: 0.6;
        }

        /* Enter Button */
        .enter-button {
            display: inline-block;
            padding: 1.2rem 3.5rem;
            background: var(--warm-brown);
            color: var(--cream);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(139, 94, 60, 0.15);
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeSlideUp 1s ease-out forwards 1.3s;
        }

        .enter-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--light-brown) 0%, var(--warm-brown) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .enter-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(139, 94, 60, 0.25);
        }

        .enter-button:hover::before {
            opacity: 1;
        }

        .enter-button span {
            position: relative;
            z-index: 1;
        }

        /* Subtitle under button */
        .sub-text {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--warm-brown);
            opacity: 0.7;
            font-weight: 300;
            letter-spacing: 0.5px;
            opacity: 0;
            animation: fadeSlideUp 1s ease-out forwards 1.5s;
        }

        /* Small decorative elements */
        .decorative-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2.5rem;
            opacity: 0;
            animation: fadeSlideUp 1s ease-out forwards 1.7s;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--soft-green);
            border-radius: 50%;
            opacity: 0.4;
        }

        .dot:nth-child(2) {
            background: var(--warm-brown);
        }

        .dot:nth-child(3) {
            background: var(--light-brown);
        }

        /* Fade out transition */
        .intro-wrapper.fade-out {
            animation: fadeOutPage 0.8s ease-out forwards;
        }

        /* Animations */
        @keyframes fadeSlideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes expandWidth {
            to {
                opacity: 1;
                width: 120px;
            }
        }

        @keyframes fadeOutPage {
            to {
                opacity: 0;
                transform: scale(1.02);
            }
        }

        @keyframes floatRotate {
            0%, 100% {
                transform: rotate(0deg) translateY(0);
            }
            50% {
                transform: rotate(180deg) translateY(-20px);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .content-container {
                padding: 1.5rem;
            }

            .cafe-icon {
                width: 60px;
                height: 60px;
                margin-bottom: 1.5rem;
            }

            .cafe-name {
                margin-bottom: 0.75rem;
            }

            .divider {
                margin: 1.5rem auto;
            }

            .tagline {
                margin-bottom: 2.5rem;
            }

            .enter-button {
                padding: 1rem 3rem;
                font-size: 0.9rem;
            }

            .circle-1, .circle-2, .circle-3 {
                display: none;
            }

            .coffee-bean {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .enter-button {
                padding: 0.9rem 2.5rem;
            }

            .leaf-left, .leaf-right {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="intro-wrapper" id="introWrapper">
        <!-- Decorative Circles -->
        <div class="decor-circle circle-1"></div>
        <div class="decor-circle circle-2"></div>
        <div class="decor-circle circle-3"></div>

        <!-- Coffee Bean Icons -->
        <div class="coffee-bean bean-1">☕</div>
        <div class="coffee-bean bean-2">☕</div>
        <div class="coffee-bean bean-3">🍃</div>
        <div class="coffee-bean bean-4">🍃</div>

        <!-- Main Content -->
        <div class="content-container">
            <!-- Cafe Icon/Logo -->
            <div class="cafe-icon">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Coffee Cup -->
                    <path d="M20 35 L25 70 C25 75 27 78 32 78 L68 78 C73 78 75 75 75 70 L80 35 Z" 
                          fill="#8B5E3C" opacity="0.2"/>
                    <path d="M20 35 L25 70 C25 75 27 78 32 78 L68 78 C73 78 75 75 75 70 L80 35 Z" 
                          stroke="#8B5E3C" stroke-width="2" fill="none"/>
                    <!-- Handle -->
                    <path d="M80 40 Q90 45 90 55 Q90 65 80 70" 
                          stroke="#8B5E3C" stroke-width="2" fill="none"/>
                    <!-- Steam -->
                    <path d="M35 25 Q35 18 38 15" stroke="#7A8B5A" stroke-width="1.5" 
                          stroke-linecap="round" opacity="0.6"/>
                    <path d="M50 22 Q50 15 53 12" stroke="#7A8B5A" stroke-width="1.5" 
                          stroke-linecap="round" opacity="0.6"/>
                    <path d="M65 25 Q65 18 68 15" stroke="#7A8B5A" stroke-width="1.5" 
                          stroke-linecap="round" opacity="0.6"/>
                    <!-- Saucer -->
                    <ellipse cx="50" cy="78" rx="35" ry="5" fill="#8B5E3C" opacity="0.15"/>
                </svg>
            </div>

            <!-- Cafe Name -->
            <h1 class="cafe-name">
                <span class="amma">Amma</span>
                Cafe
            </h1>

            <!-- Divider -->
            <div class="divider"></div>

            <!-- Tagline -->
            <p class="tagline">
                <span class="leaf-left">🍃</span>
                Fresh Brews, Cozy Corners, Memorable Moments
                <span class="leaf-right">🍃</span>
            </p>

            <!-- Enter Button -->
            <a href="home.html" class="enter-button" id="enterBtn">
                <span>Explore Amma Cafe</span>
            </a>

            <!-- Sub Text -->
            <p class="sub-text">Your warm escape awaits</p>

            <!-- Decorative Dots -->
            <div class="decorative-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <script>
        // Smooth transition when clicking Enter button
        document.getElementById('enterBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const wrapper = document.getElementById('introWrapper');
            wrapper.classList.add('fade-out');
            
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 800);
        });

        // Prevent body scroll
        document.body.style.overflow = 'hidden';

        // Optional: Auto-redirect after 8 seconds (uncomment if needed)
        // setTimeout(() => {
        //     document.getElementById('enterBtn').click();
        // }, 8000);
    </script>
</body>
</html>
